    evidence_level: C
    effect_cn: "INR 升高 (报告中可达 4.0+), 瘀斑/出血"
    mechanism_summary_cn: "当归含香豆素衍生物 (psoralen, bergapten, 阿魏酸); 动物模型显示延长 PT, 推测 CYP2C9 抑制及独立抗凝活性."
    mechanisms:
      - { type: enzyme, target: "CYP2C9", detail: "推测抑制" }
      - { type: pathway, target: "coagulation_cascade" }
    clinical_action: "避免合用; 妇科常见以当归调经/补血, 需排查华法林适应证."
    monitoring: ["INR", "出血体征"]
    evidences:
      - source_type: case_report
        evidence_keywords: "Page RL Pharmacotherapy 1999 dong quai warfarin INR"
      - source_type: preclinical
        evidence_keywords: "Lo AC danggui warfarin rat pharmacokinetic"

  - id: "INT-WF-RENSHEN-005"
    drug: { id: "DRUG-WARFARIN", name_cn: "华法林", name_en: "Warfarin", atc_code: "B01AA03", therapeutic_index: "narrow" }
    herb:
      id: "HERB-RENSHEN"
      name_cn: "人参"
      name_pinyin: "renshen"
      name_latin: "Panax ginseng"
      parts_used: ["root"]
    severity: moderate
    direction: variable
    documentation: probable
    evidence_level: B
    effect_cn: "多数报告 INR 降低, 抗凝失效; 个别病例报告 INR 升高 (个体差异大)"
    mechanism_summary_cn: |
      可能诱导 CYP2C9/CYP3A4 加速华法林清除 (主流机制).
      但人参皂苷亦有独立抗血小板活性, 故部分个体表现为出血.
      双向效应使其成为 'variable' 而非单纯 increase/decrease.
    mechanisms:
      - { type: enzyme, target: "CYP2C9", detail: "可能诱导" }
      - { type: pathway, target: "platelet_aggregation", detail: "弱抑制" }
    clinical_action: "避免合用. 已合用者监测 INR; 开始或停用人参时尤需复测."
    monitoring: ["INR (开始/停用人参时密切监测)"]
    evidences:
      - source_type: case_report
        evidence_keywords: "Janetzky K Am J Health Syst Pharm 1997 ginseng warfarin"
      - source_type: rct
        evidence_keywords: "Yuan CS Ann Intern Med 2004 ginseng warfarin RCT"

