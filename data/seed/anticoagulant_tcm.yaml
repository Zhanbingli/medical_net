# =============================================================================
# 后续扩展建议 (Phase 1.1 - Phase 2)
# =============================================================================
#
# 缺口 1: 国内常用中成药复方 (待补充)
#   - 血塞通 (含三七总皂苷) × 抗凝
#   - 麝香保心丸 (含蟾酥/麝香) × 抗凝
#   - 速效救心丸 (含川芎/冰片) × 抗凝
#   - 通心络胶囊 (多组分) × 抗凝/抗血小板
#
# 缺口 2: 抗血小板药未涵盖
#   - 西洛他唑 (cilostazol) × 中药 - CYP3A4 底物, 与五味子/SJW 互作
#   - 普拉格雷 (prasugrel) × 中药
#
# 缺口 3: LMWH/磺达肝癸钠 × 中药
#   - 一般注射剂受 CYP/P-gp 影响小, 但 PD 叠加仍有意义
#
# 缺口 4: 罕见但严重的中药
#   - 雷公藤 (Tripterygium wilfordii) - 强免疫抑制, 与多数药物互作
#   - 含马兜铃酸药材 (已禁用但历史方剂仍有)
#
# 总目标: Phase 1 完成 ~50 条心血管抗凝核心条目, Phase 2 扩展至 100+
# =============================================================================
