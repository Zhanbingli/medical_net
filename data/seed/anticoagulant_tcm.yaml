      - { type: pathway, target: "coagulation_cascade", detail: "双向" }
    clinical_action: "避免合用. 国内 '复方丹参滴丸' 含三七, 需作为整体方剂评估."
    monitoring: ["INR", "出血体征"]
    evidences:
      - source_type: review
        evidence_keywords: "Panax notoginseng warfarin interaction review"

