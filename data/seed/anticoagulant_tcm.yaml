# =============================================================================
# 心血管抗凝/抗血小板药物 × 中药 互作种子数据
# Phase 1 范围: 30 条高频/高风险互作, 用于初始化知识图谱
# =============================================================================
#
# 字段说明:
#   severity:        major | moderate | minor | theoretical
#   direction:       increase (西药效应增强) | decrease | variable
#   evidence_level:  A (RCT/meta) | B (单 RCT 或多 case-control) |
#                    C (病例系列) | D (单病例 / 仅 PK / 仅体外动物)
#   documentation:   established | probable | suspected | theoretical
#
# 重要提醒 (curator 须知):
#   - 本文件作为 seed, 每条都需在临床使用前核对原文
#   - evidence_keywords 是检索提示, 非完整引用; 经核对后填入 evidence.pmid/doi
#   - "established" 标签仅给国际通用药典/指南/FDA 标签明确警示的条目
#   - 中药剂量/剂型差异显著影响互作强度, 临床建议须结合具体方剂使用
# =============================================================================

interactions:

  # ---------------------------------------------------------------------------
  # 华法林 (Warfarin) 系列 - 治疗指数最窄, 出事最多
  # ---------------------------------------------------------------------------

  - id: "INT-WF-DS-001"
    drug:
      id: "DRUG-WARFARIN"
      name_cn: "华法林"
      name_en: "Warfarin"
      atc_code: "B01AA03"
      drug_class: "Vitamin K antagonist"
      therapeutic_index: "narrow"
    herb:
      id: "HERB-DANSHEN"
      name_cn: "丹参"
      name_pinyin: "danshen"
      name_latin: "Salvia miltiorrhiza"
      parts_used: ["root", "rhizome"]
    severity: major
    direction: increase
    documentation: established
    evidence_level: B
    onset: delayed
    effect_cn: "INR 显著升高, 皮下/消化道/颅内出血风险增加"
    mechanism_summary_cn: |
      多机制叠加:
      (1) 丹参酮 IIA 抑制 CYP2C9, 减少 S-华法林代谢
      (2) 丹参素及其他水溶性成分独立抗凝/抗血小板
      (3) 蛋白结合置换效应 (与白蛋白结合, 升高游离华法林)
    mechanisms:
      - { type: enzyme, target: "CYP2C9", detail: "中等度抑制" }
      - { type: pathway, target: "platelet_aggregation", detail: "独立抑制" }
      - { type: pathway, target: "coagulation_cascade" }
    clinical_action: "避免合用. 已合用者立即检测 INR, 1-2 周内复测; 出血时停用并补充维生素 K1."
    monitoring: ["INR", "皮下瘀斑", "黑便", "头痛/神经症状"]
    high_risk_groups: ["老年", "肝功能不全", "INR 不稳定", "CYP2C9 *2/*3 携带者"]
    evidences:
      - source_type: case_report
        evidence_keywords: "Yu CM Aust N Z J Med 1997 warfarin danshen INR"
        summary_cn: "62 岁女性 INR 8.4 + 皮下血肿"
      - source_type: case_report
        evidence_keywords: "Tam LS Aust N Z J Med 1995 danshen warfarin"
      - source_type: pk_study
        evidence_keywords: "Lo AC danshen warfarin pharmacokinetic rat 1992"
    notes: "国内冠心病合并房颤患者常并用, 复方丹参滴丸尤其常见, 临床盲区."

  - id: "INT-WF-FFDS-002"
    drug: { id: "DRUG-WARFARIN", name_cn: "华法林", name_en: "Warfarin", atc_code: "B01AA03", therapeutic_index: "narrow" }
    formula:
      id: "FORMULA-FUFANG-DANSHEN"
      name_cn: "复方丹参滴丸"
      composition_text: "丹参、三七、冰片"
      composition_herbs: ["HERB-DANSHEN", "HERB-SANQI", "HERB-BINGPIAN"]
    severity: major
    direction: increase
    documentation: probable
    evidence_level: B
    effect_cn: "出血风险显著增加 (丹参 + 三七 双重抗凝叠加)"
    mechanism_summary_cn: "丹参 (CYP2C9 抑制 + 抗血小板) 与三七 (抗凝活血) 双成分叠加效应."
    clinical_action: "避免合用. 国内冠心病合并华法林适应证 (如机械瓣膜) 患者必须明确告知禁用."
    monitoring: ["INR", "出血体征"]
    high_risk_groups: ["机械瓣膜置换术后", "老年"]
    evidences:
      - source_type: review
        evidence_keywords: "复方丹参滴丸 华法林 互作 综述"
    notes: "中国心内科最高频的中西药互作之一, 必须放在 alert 头部."

  - id: "INT-WF-GINKGO-003"
    drug: { id: "DRUG-WARFARIN", name_cn: "华法林", name_en: "Warfarin", atc_code: "B01AA03", therapeutic_index: "narrow" }
    herb:
      id: "HERB-GINKGO"
      name_cn: "银杏叶"
      name_pinyin: "yinxingye"
      name_latin: "Ginkgo biloba"
      parts_used: ["leaf"]
    severity: moderate
    direction: increase
    documentation: established
    evidence_level: B
    effect_cn: "出血风险增加, 已有自发性硬膜下/视网膜出血病例"
    mechanism_summary_cn: |
      银杏内酯 B (ginkgolide B) 是血小板活化因子 (PAF) 拮抗剂, 抑制血小板聚集.
      多数 PK 研究未发现对华法林代谢 (CYP2C9) 的显著影响, 主要为药效学叠加.
    mechanisms:
      - { type: target, target: "PAF_receptor", detail: "ginkgolide B 拮抗" }
      - { type: pathway, target: "platelet_aggregation" }
    clinical_action: "避免银杏补充剂. 无银杏适应证患者建议停用; 必要时改用其他药物."
    monitoring: ["INR (尽管多无显著变化)", "出血体征", "瘀斑", "眼底/神经症状"]
    high_risk_groups: ["老年", "联用其他抗血小板药"]
    evidences:
      - source_type: case_report
        evidence_keywords: "Matthews MK Neurology 1998 ginkgo subdural hematoma"
      - source_type: pk_study
        evidence_keywords: "Jiang X Br J Clin Pharmacol 2005 ginkgo warfarin"

  - id: "INT-WF-DONGQUAI-004"
    drug: { id: "DRUG-WARFARIN", name_cn: "华法林", name_en: "Warfarin", atc_code: "B01AA03", therapeutic_index: "narrow" }
    herb:
